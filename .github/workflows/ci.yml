name: Continuous Integration
on:
  push:
    branches: [main, master]
    pull_request:
      branches: [main, master]
jobs:
  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Dependencies
        run: |
          cd backend
          go mod download

      - name: Run Backend Tests
        run: |
          cd backend
          go test -v ./...
      

